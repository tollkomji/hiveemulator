apiVersion: v1
kind: ConfigMap
metadata:
  name: map-client-config
  namespace: hiveemulator-rgr
  labels:
    app: map-client
data:
  config.json: |
    {
      "API": "http://188.245.181.186:32080/control/api/v1/client"
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: map-client
  namespace: hiveemulator-rgr
  labels:
    app: map-client
spec:
  replicas: 2
  selector:
    matchLabels:
      app: map-client
  template:
    metadata:
      labels:
        app: map-client
    spec:
      containers:
        - name: map-client
          image: ghcr.io/tollkomji/hiveemulator/map-client:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: config-volume
              mountPath: /usr/share/nginx/html/config.json
              subPath: config.json
          readinessProbe:
            httpGet:
              path: /config.json
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: config-volume
          configMap:
            name: map-client-config
---
apiVersion: v1
kind: Service
metadata:
  name: map-client
  namespace: hiveemulator-rgr
  labels:
    app: map-client
spec:
  selector:
    app: map-client
  ports:
    - name: http
      port: 80
      targetPort: 80
