name: CI/CD

on:
  push:
    branches:
      - main
      - dev
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Deployment target"
        required: true
        default: development
        type: choice
        options:
          - development
          - production

permissions:
  contents: read
  packages: write

env:
  DOTNET_VERSION: "8.0.x"
  NODE_VERSION: "20"
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build and validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore .NET dependencies
        run: dotnet restore src/CommunicationControl/DevOpsProject.sln

      - name: Build .NET solution
        run: dotnet build src/CommunicationControl/DevOpsProject.sln --configuration Release --no-restore

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: src/MapClient/package-lock.json

      - name: Install map client dependencies
        run: npm ci
        working-directory: src/MapClient

      - name: Lint map client
        run: npm run lint
        working-directory: src/MapClient

      - name: Build map client
        run: npm run build
        working-directory: src/MapClient

  docker:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: communication-control
            context: src/CommunicationControl
            dockerfile: src/CommunicationControl/DevOpsProject/Dockerfile
          - name: hive-mind
            context: src/CommunicationControl
            dockerfile: src/CommunicationControl/DevOpsProject.HiveMind.API/Dockerfile
          - name: map-client
            context: src/MapClient
            dockerfile: src/MapClient/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.name }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=sha,prefix=
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name != 'pull_request' && github.ref_type == 'branch'
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.target_environment || (github.ref_name == 'main' && 'production' || 'development') }}
    env:
      IMAGE_REPOSITORY: ${{ github.repository }}
      IMAGE_TAG: ${{ github.sha }}
      TARGET_ENVIRONMENT: ${{ github.event_name == 'workflow_dispatch' && inputs.target_environment || (github.ref_name == 'main' && 'production' || 'development') }}
      BRANCH_NAME: ${{ github.ref_name }}

    steps:
      - name: Deploy stack over SSH
        shell: bash
        env:
          DEV_VPS_HOST: ${{ secrets.DEV_VPS_HOST }}
          DEV_VPS_USER: ${{ secrets.DEV_VPS_USER }}
          DEV_VPS_SSH_KEY: ${{ secrets.DEV_VPS_SSH_KEY }}
          PROD_VPS_HOST: ${{ secrets.PROD_VPS_HOST }}
          PROD_VPS_USER: ${{ secrets.PROD_VPS_USER }}
          PROD_VPS_SSH_KEY: ${{ secrets.PROD_VPS_SSH_KEY }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        run: |
          set -euo pipefail

          if [[ "${TARGET_ENVIRONMENT}" == "production" ]]; then
            VPS_HOST="${PROD_VPS_HOST}"
            VPS_USER="${PROD_VPS_USER}"
            VPS_SSH_KEY="${PROD_VPS_SSH_KEY}"
          else
            VPS_HOST="${DEV_VPS_HOST}"
            VPS_USER="${DEV_VPS_USER}"
            VPS_SSH_KEY="${DEV_VPS_SSH_KEY}"
          fi

          if [[ -z "${VPS_HOST}" || -z "${VPS_USER}" || -z "${VPS_SSH_KEY}" || -z "${GHCR_USERNAME}" || -z "${GHCR_READ_TOKEN}" ]]; then
            echo "Deployment secrets are not configured for ${TARGET_ENVIRONMENT}. Build and Docker push completed; deployment skipped."
            exit 0
          fi

          install -m 700 -d ~/.ssh
          printf '%s\n' "${VPS_SSH_KEY}" > ~/.ssh/hiveemulator_deploy
          chmod 600 ~/.ssh/hiveemulator_deploy
          ssh-keyscan -H "${VPS_HOST}" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/hiveemulator_deploy "${VPS_USER}@${VPS_HOST}" "mkdir -p ~/hiveemulator"
          ssh -i ~/.ssh/hiveemulator_deploy "${VPS_USER}@${VPS_HOST}" "cd ~/hiveemulator && git fetch origin '${BRANCH_NAME}' && git checkout '${BRANCH_NAME}' && git pull --ff-only"
          ssh -i ~/.ssh/hiveemulator_deploy "${VPS_USER}@${VPS_HOST}" "cd ~/hiveemulator && echo '${GHCR_READ_TOKEN}' | docker login ghcr.io -u '${GHCR_USERNAME}' --password-stdin && PUBLIC_HOST='${VPS_HOST}' REGISTRY='${REGISTRY}' IMAGE_REPOSITORY='${IMAGE_REPOSITORY}' IMAGE_TAG='${IMAGE_TAG}' deployment/lab5/scripts/deploy.sh"
